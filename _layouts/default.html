<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }}" href="{{ site.baseurl }}/feed.xml" />

    <!-- Created with Jekyll Now - http://github.com/barryclark/jekyll-now -->
  </head>

  <body>
    <div class="wrapper-masthead">
      <div class="container">
        <header class="masthead clearfix">
          <!-- <a href="{{ site.baseurl }}/"><img class="site-banner" src="{{ site.avatar }}" title="Photo: Derek Parfit"/></a> -->
          <div class="site-info">
            <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>

            <p class="site-description" id="tagline"></p>
            <script type="text/javascript" async>
              function randomtext() {
                  var randomtxt = [
                      'adjustable assessments',
                      'brief beliefs',
                      'changeable conjectures',
                      'deciduous determinations',
                      'ductile densities',
                      'draft distributions',
                      'ephemeral estimates',
                      'fluctuating findings',
                      'high-variance hypotheses',
                      'impermanent impressions',
                      'inconstant intuitions',
                      'malleable models',
                      'precarious postulates',
                      'protean propositions',
                      'pliable persuasions',
                      'preliminary predictions',
                      'quivering quantifications',
                      'revisable reckonings',
                      'short-lived suppositions',
                      'speculative surmises',
                      'shifting standpoints',
                      'transitory takes',
                      'temporary theses',
                      'volatile views'];
                  return randomtxt[Math.floor((Math.random() * randomtxt.length))];
              }
              document.getElementById("tagline").innerHTML = randomtext();
            </script>
          </div>

          <nav>
            <a href="{{ site.baseurl }}/about">about</a>
            <a href="{{ site.baseurl }}/index-by-year">all posts</a>
          </nav>
        </header>
      </div>
    </div>

    <div id="main" role="main" class="container">
      {{ content }}
    </div>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">
          <!-- {% include svg-icons.html %} -->    
          {% include mailchimp-signup.html %}
          
          
          <!-- BOTTOM NAVBAR -->
          <div>
          <a href="{{ site.baseurl }}/feed.xml">feed</a>
          <a href="https://quotables.github.io/">quotes</a>

          </div>
        </footer>
      </div>
    </div>

    {% include analytics.html %}
  </body>
</html>
